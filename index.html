<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bombay Kids International School — Conduct</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --paper:#f2f0e6; --surface:#ffffff; --surface-alt:#ebe7da;
    --ink:#1e2a38; --ink-soft:#5b6472; --line:#dedacb;
    --brand:#c0392b; --brand-dark:#96271c; --brand-soft:#f8e2df;
    --accent:#a8752c; --accent-soft:#f3e8d6;
    --good:#3f6b4e; --good-soft:#e4ede6;
    --bad:#9c4a3d; --bad-soft:#f3e1dc;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans',ui-sans-serif,system-ui,sans-serif;font-size:14px;}
  h1,h2,h3{font-family:'Newsreader',serif;font-weight:500;margin:0;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink);}
  ::placeholder{color:var(--ink-soft);}

  /* ---------- lock screen ---------- */
  #lockScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .lock-wrap{width:100%;max-width:360px;}
  .wordmark{text-align:center;margin-bottom:24px;}
  .wordmark .school-name{display:block;font-family:'Newsreader',serif;font-weight:600;font-size:22px;color:var(--brand);line-height:1.25;}
  .wordmark .word{display:block;margin-top:4px;font-family:'Newsreader',serif;font-size:15px;color:var(--ink-soft);}
  .wordmark p{margin:4px 0 0;font-size:13px;color:var(--ink-soft);}
  .lock-card{background:var(--surface);border:1px solid var(--line);border-top:3px solid var(--brand);border-radius:12px;padding:32px;}

  /* ---------- shared UI ---------- */
  .record-tag{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;letter-spacing:.02em;color:var(--ink-soft);background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:3px 8px;display:inline-block;white-space:nowrap;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:8px 10px;background:var(--surface);}
  input[type="text"],input:not([type]),textarea{text-transform:uppercase;}
  input[type="text"]::placeholder,textarea::placeholder{text-transform:none;}
  .field input:focus-visible,.field select:focus-visible,.field textarea:focus-visible{outline:2px solid var(--brand);outline-offset:1px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
  .form-grid .span2{grid-column:1/-1;}
  .section-title{grid-column:1/-1;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--brand);border-top:1px solid var(--line);padding-top:14px;margin-top:6px;margin-bottom:4px;}
  .section-title:first-child{border-top:none;margin-top:0;padding-top:0;}
  .btn{border-radius:6px;padding:9px 16px;font-size:13px;font-weight:500;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px;}
  .btn-primary{background:var(--brand);color:#fff;}
  .btn-primary:hover{background:var(--brand-dark);}
  .btn-secondary{background:var(--surface);border-color:var(--line);color:var(--ink);}
  .btn-secondary:hover{background:var(--surface-alt);}
  .btn-danger{background:transparent;color:var(--bad);border-color:var(--bad-soft);}
  .btn-danger:hover{background:var(--bad-soft);}
  .btn-block{width:100%;justify-content:center;}
  .btn-sm{padding:5px 10px;font-size:12px;}
  .btn:disabled{opacity:.55;cursor:not-allowed;}
  .msg{font-size:13px;padding:8px 12px;border-radius:6px;margin-bottom:14px;}
  .msg-error{background:var(--bad-soft);color:var(--bad);}
  .pill{display:inline-flex;align-items:center;border-radius:999px;padding:3px 10px;font-size:12px;font-weight:500;}
  .pill-good{background:var(--good-soft);color:var(--good);}
  .pill-bad{background:var(--bad-soft);color:var(--bad);}
  .pill-neutral{background:var(--surface-alt);color:var(--ink-soft);}
  .pill-accent{background:var(--accent-soft);color:var(--accent);}
  .att-toggle{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;}
  .att-btn{border:none;background:var(--surface);padding:4px 11px;font-size:12px;font-weight:700;cursor:pointer;color:var(--ink-soft);font-family:inherit;}
  .att-btn+.att-btn{border-left:1px solid var(--line);}
  .att-btn.active.att-p{background:var(--good);color:#fff;}
  .att-btn.active.att-a{background:var(--bad);color:#fff;}
  .att-btn.active.att-l{background:var(--accent);color:#fff;}
  .pill-accent{background:var(--accent-soft);color:var(--accent);}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:20px;}
  .avatar{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;background:var(--brand-soft);color:var(--brand-dark);font-size:12px;font-weight:500;flex-shrink:0;}

  /* ---------- app shell ---------- */
  #app{display:flex;min-height:100vh;}
  .sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;}
  .sidebar .brand{padding:22px 20px;border-bottom:1px solid var(--line);}
  .sidebar .brand .school-name{display:block;font-family:'Newsreader',serif;font-weight:600;font-size:15px;color:var(--brand);line-height:1.3;}
  .sidebar .brand .word{font-family:'Newsreader',serif;font-size:12px;color:var(--ink-soft);}
  .sidebar .brand p{margin:2px 0 0;font-size:11px;color:var(--ink-soft);}
  .sidebar nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:2px;}
  .nav-link{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;color:var(--ink-soft);font-size:14px;background:none;border:none;text-align:left;width:100%;}
  .nav-link:hover{background:var(--surface-alt);color:var(--ink);}
  .nav-link.active{background:var(--brand-soft);color:var(--brand-dark);font-weight:500;}
  .nav-link .dot{width:16px;text-align:center;}
  .sidebar .footer{border-top:1px solid var(--line);padding:14px 20px;font-size:12px;color:var(--ink-soft);}
  .sidebar .footer .name{color:var(--ink);font-weight:500;}
  .sidebar .footer button{background:none;border:none;color:var(--ink-soft);font-size:12px;padding:0;margin-top:4px;display:block;}
  .sidebar .footer button:hover{color:var(--brand);}
  .main{flex:1;min-width:0;}
  .topbar{position:sticky;top:0;background:rgba(242,240,230,.94);backdrop-filter:blur(2px);border-bottom:1px solid var(--line);padding:20px 32px;display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:12px 16px;}
  .topbar h1{font-size:26px;}
  .topbar p{margin:4px 0 0;font-size:13px;color:var(--ink-soft);}
  .content{padding:28px 32px;}

  /* ---------- tables ---------- */
  table{width:100%;border-collapse:collapse;font-size:14px;}
  thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);background:var(--surface-alt);padding:10px 14px;}
  tbody td{padding:10px 14px;border-bottom:1px solid var(--line);}
  tbody tr:hover{background:rgba(235,231,218,.5);}
  .table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .empty{padding:48px 20px;text-align:center;color:var(--ink-soft);}

  /* ---------- grids ---------- */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px;}
  .stat-card{background:var(--surface);border:1px solid var(--line);border-top:2px solid var(--brand);border-radius:10px;padding:16px;}
  .stat-card.accent{border-top-color:var(--accent);}
  .stat-card.good{border-top-color:var(--good);}
  .stat-card .label{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);}
  .stat-card .value{font-family:'Newsreader',serif;font-size:34px;margin-top:10px;}
  .stat-card .hint{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .staff-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;}
  .two-col{display:grid;grid-template-columns:2fr 3fr;gap:16px;align-items:start;}
  .detail-layout{display:grid;grid-template-columns:3fr 2fr;gap:16px;align-items:start;}
  .detail-layout .stack{display:flex;flex-direction:column;gap:14px;}

  /* ---------- toolbar ---------- */
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px;}
  .toolbar input[type=text],.toolbar select{border:1px solid var(--line);border-radius:6px;padding:8px 10px;background:var(--surface);}
  .toolbar .spacer{flex:1;}
  .quick-actions{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
  .quick-action{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:10px 16px;font-size:13px;font-weight:500;color:var(--ink);}
  .quick-action:hover{border-color:var(--brand);color:var(--brand-dark);background:var(--brand-soft);}
  .qa-icon{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--brand-soft);color:var(--brand-dark);font-size:13px;flex-shrink:0;}
  .quick-action:hover .qa-icon{background:var(--surface);}

  /* ---------- modal ---------- */
  .modal-backdrop{position:fixed;inset:0;background:rgba(30,42,56,.42);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;z-index:80;}
  .modal{background:var(--surface);border-radius:12px;max-width:600px;width:100%;padding:26px;margin-bottom:40px;}
  .modal-wide{max-width:820px;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .modal-head button{background:none;border:none;font-size:20px;color:var(--ink-soft);line-height:1;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}

  /* ---------- responsive ---------- */
  @media (max-width:820px){
    #app{flex-direction:column;}
    .sidebar{width:100%;flex-direction:row;align-items:center;border-right:none;border-bottom:1px solid var(--line);}
    .sidebar .brand{border-bottom:none;padding:14px 16px;}
    .sidebar nav{flex-direction:row;padding:10px;overflow-x:auto;}
    .sidebar .footer{display:none;}
    .topbar,.content{padding-left:18px;padding-right:18px;}
    .two-col{grid-template-columns:1fr;}
    .detail-layout{grid-template-columns:1fr;}
    .form-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-wrap">
    <div class="wordmark"><img id="lockLogo" alt="Bombay Kids International School" style="height:64px;margin-bottom:8px;display:none;" /><span class="word">Conduct — Student &amp; Staff Records</span></div>
    <div class="lock-card">
      <span class="record-tag" id="ayTag">AY — · Staff Access</span>
      <h1 style="font-size:20px;margin:14px 0 4px;">Sign in</h1>
      <p style="font-size:13px;color:var(--ink-soft);margin:0 0 18px;">Use the username and password your admin set up for you.</p>
      <form id="lockForm">
        <div class="field"><label>Username</label><input type="text" id="loginUsername" placeholder="e.g. priya.nair" required autofocus /></div>
        <div class="field"><label>Password</label><input type="password" id="loginPassword" required /></div>
        <div class="msg msg-error" id="lockMsg" style="display:none;"></div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>
    </div>
  </div>
</div>

<div id="app" style="display:none;">
  <aside class="sidebar">
    <div class="brand"><img id="sidebarLogo" alt="Bombay Kids International School" style="height:38px;margin-bottom:6px;display:none;" /><span class="word">Conduct</span><p>Arihant Nagar, Indore</p></div>
    <nav id="sidebarNav"></nav>
    <div class="footer">
      <div>Signed in as <span class="name" id="footerName">—</span></div>
      <div id="footerRole" style="margin-top:2px;"></div>
      <button onclick="exportBackup()">Export backup</button>
      <button onclick="document.getElementById('importInput').click()">Import backup</button>
      <button onclick="lockApp()">Sign out</button>
      <input type="file" id="importInput" accept="application/json" style="display:none" onchange="importBackup(event)" />
    </div>
  </aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="content" id="content"></main>
  </div>
</div>

<div id="modalRoot"></div>

function computeTotalDue(studentId, particulars){
  const s = students.find(x=>x.id===studentId);
  if(!s) return 0;
  const fs = FEE_STRUCTURE[s.cls];
  if(particulars==='Admission Fee') return fs ? fs.admissionFee : 500;
  if(particulars==='Term 1 (June-July)') return fs ? fs.term1 : 0;

  if(particulars==='Board Exam Fee') return getBoardExamFee(s.cls);
  return 0; // 'Other' — admin enters manually via the Negotiated Fee override
}

function currentUser(){
  try{
    const session = JSON.parse(localStorage.getItem(LS.session) || 'null');
    if(!session) return null;
    return users.find(u => u.id === session.userId && u.status === 'active') || null;
  }catch(e){ return null; }
}
function can(permKey){
  const u = currentUser();
  return !!(u && u.permissions && u.permissions.view && u.permissions.view[permKey]);
}
function canEdit(permKey){
  const u = currentUser();
  if(!u) return false;
  if(u.role === 'admin') return true; // admin always has edit rights, regardless of stored flags
  return !!(u.permissions && u.permissions.edit && u.permissions.edit[permKey]);
}
/** Upgrades any user record still on the old flat permissions shape
 *  (from before view/edit were split) to the new nested shape, in place.
 *  Existing view access is preserved exactly; edit access starts closed
 *  for everyone except admins, matching the new default. */
function migrateUserPermissionsIfNeeded(){
  let changed = false;
  users.forEach(u => {
    if(u.permissions && !u.permissions.view){
      const oldFlat = u.permissions;
      const view = Object.assign({ studentAttendance: !!oldFlat.students, staffAttendance: !!oldFlat.staffDirectory }, oldFlat);
      const edit = {};
      EDIT_PERMISSION_KEYS.forEach(k => { edit[k] = u.role === 'admin'; });
      u.permissions = { view, edit };
      changed = true;
    }
  });
  if(changed) saveAll();
}
/** Fills in any permission keys added in a later update that an existing
 *  (already-migrated) user record predates — e.g. a user created before
 *  Expenses existed won't have a view.expenses flag at all. Admin always
 *  backfills to true; everyone else backfills from their role's preset
 *  for view, and stays closed for edit (requirement: edit defaults off). */
function backfillPermissionKeysIfNeeded(){
  let changed = false;
  users.forEach(u => {
    if(!u.permissions || !u.permissions.view) return;
    const preset = ROLE_PRESETS[u.role] || ROLE_PRESETS.custom;
    VIEW_PERMISSION_KEYS.forEach(k => {
      if(!(k in u.permissions.view)){
        u.permissions.view[k] = u.role === 'admin' ? true : !!preset.view[k];
        changed = true;
      }
    });
    EDIT_PERMISSION_KEYS.forEach(k => {
      if(!(k in u.permissions.edit)){
        u.permissions.edit[k] = u.role === 'admin';
        changed = true;
      }
    });
  });
  if(changed) saveAll();
}

}

  const now = new Date();
  const startYear = now.getMonth() >= 5 ? now.getFullYear() : now.getFullYear()-1;
  return startYear + '–' + String((startYear+1)%100).padStart(2,'0');
}
function currentMonthKey(){ return new Date().toISOString().slice(0,7); }
function monthLabel(key){
  if(!key) return '—';
  const [y,m] = key.split('-');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return months[parseInt(m,10)-1] + ' ' + y;
}
const TIMEFRAME_LABELS = {today:'Today', thisMonth:'This Month', thisSession:'This Academic Year'};
function getTimeframeRange(tf){
  const now = new Date();
  if(tf === 'today'){
    const iso = todayIso();
    return {start: iso, end: iso};
  }
  if(tf === 'thisMonth'){
    const y = now.getFullYear(), m = now.getMonth();
    const start = new Date(y, m, 1).toISOString().slice(0,10);
    const end = new Date(y, m+1, 0).toISOString().slice(0,10);
    return {start, end};
  }
  // thisSession — Indian academic year, roughly June through the following May
  const startYear = now.getMonth() >= 5 ? now.getFullYear() : now.getFullYear()-1;
  return {start: startYear+'-06-01', end: (startYear+1)+'-05-31'};
}
function inRange(dateStr, range){
  if(!dateStr) return false;
  const d = dateStr.slice(0,10);
  return d >= range.start && d <= range.end;
}
function monthKeyInRange(monthKey, tf){
  if(!monthKey) return false;
  if(tf === 'today' || tf === 'thisMonth') return monthKey === currentMonthKey();
  const range = getTimeframeRange('thisSession');
  return monthKey >= range.start.slice(0,7) && monthKey <= range.end.slice(0,7);
}
function todayIso(){ return new Date().toISOString().slice(0,10); }

const ONES = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
const TENS = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
function numberToWords(n){
  if(n === 0) return 'Zero';
  if(n < 20) return ONES[n];
  if(n < 100) return TENS[Math.floor(n/10)] + (n%10 ? ' ' + ONES[n%10] : '');
  if(n < 1000) return ONES[Math.floor(n/100)] + ' Hundred' + (n%100 ? ' ' + numberToWords(n%100) : '');
  if(n < 100000) return numberToWords(Math.floor(n/1000)) + ' Thousand' + (n%1000 ? ' ' + numberToWords(n%1000) : '');
  return String(n);
}
function ordinal(n){
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}
function dateInWords(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  if(isNaN(d)) return '—';
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return ordinal(d.getDate()) + ' ' + months[d.getMonth()] + ' ' + numberToWords(d.getFullYear());
}
function pronounSet(gender){
  if(gender === 'Female') return {subj:'She', poss:'Her', child:'daughter'};
  if(gender === 'Male') return {subj:'He', poss:'His', child:'son'};
  return {subj:'They', poss:'Their', child:'son/daughter'};
}
/** "7" -> "7th", "KG-II" -> "KG-II" (only numeric classes take an ordinal suffix) */
function classOrdinal(value){
  if(!value) return '—';
  const trimmed = String(value).trim();
  return /^\d+$/.test(trimmed) ? ordinal(parseInt(trimmed,10)) : trimmed;
}
function feeStatus(rec){
  const due = Number(rec.amountDue)||0, paid = Number(rec.amountPaid)||0;
  if(paid <= 0) return 'pending';
  if(paid < due) return 'partial';
  return 'paid';
}
function money(n){ return '₹' + (Number(n)||0).toLocaleString('en-IN'); }
/** '5' -> 'Class 5'; non-numeric names (Pre Nursery, KG-I...) are already proper names, left as-is. */
function classDisplayLabel(cls){
  return /^\d+$/.test(cls) ? 'Class ' + cls : cls;
}
function fileToBase64(file){
  return new Promise((resolve, reject) => {
    if(!file){ resolve(null); return; }
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
/** Downscales a large photographed image (e.g. a timetable shot on a phone)
 *  before storing it as base64, so it doesn't eat the localStorage quota. */
function resizeImageFile(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    if(!file){ resolve(null); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * maxDim/w); w = maxDim; }
          else { w = Math.round(w * maxDim/h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality || 0.85));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function avatarHtml(photo, firstName, lastName, size){
  if(photo) return `<img src="${photo}" alt="" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex-shrink:0;" />`;
  return `<span class="avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.36)}px;">${initials(firstName,lastName)}</span>`;
}

function checkSession(){
  const u = currentUser();
  if(u){
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('footerName').textContent = u.name;
    document.getElementById('footerRole').innerHTML = `<span class="record-tag" style="padding:1px 6px;">${escapeHtml(ROLE_LABELS[u.role]||u.role)}</span>`;
    renderSidebar();
    renderApp();
  }
}
document.getElementById('lockForm').addEventListener('submit', function(e){
  e.preventDefault();
  const username = document.getElementById('loginUsername').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  const msg = document.getElementById('lockMsg');
  const match = users.find(u => u.username.toLowerCase() === username && u.password === password);
  if(!match){
    msg.textContent = 'Incorrect username or password.';
    msg.style.display = 'block';
    return;
  }
  if(match.status !== 'active'){
    msg.textContent = 'This account has been deactivated. Contact your admin.';
    msg.style.display = 'block';
    return;
  }
  localStorage.setItem(LS.session, JSON.stringify({userId: match.id, at: Date.now()}));
  msg.style.display = 'none';
  checkSession();
});
function lockApp(){
  localStorage.removeItem(LS.session);
  document.getElementById('app').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('lockForm').reset();
}

function renderSidebar(){
  document.getElementById('sidebarNav').innerHTML = NAV_ITEMS.filter(item => !item.perm || can(item.perm)).map(item => {
    const active = (view.name === item.name) || (item.name==='students' && view.name==='studentDetail');
    return `<button class="nav-link ${active?'active':''}" onclick="goTo('${item.name}')"><span class="dot">${item.icon}</span>${item.label}</button>`;
  }).join('');
}
function goTo(name){
  view = { name, studentId: null };
  renderSidebar();
  renderApp();
}
function goToStudent(id){
  view = { name:'studentDetail', studentId: id };
  renderSidebar();
  renderApp();
}
const VIEW_PERMISSIONS = { dashboard:'dashboard', students:'students', studentDetail:'students', studentsByClass:'students', enquiries:'enquiries', staff:'staffDirectory', staffDetail:'staffDirectory', studentAttendance:'studentAttendance', distribution:'distribution', distributionClass:'distribution', fees:'fees', salary:'salary', expenses:'expenses', users:'userManagement' };
function renderApp(){
  const topbar = document.getElementById('topbar');
  const content = document.getElementById('content');
  const needed = VIEW_PERMISSIONS[view.name];
  if(needed && !can(needed)){ renderAccessDenied(topbar, content); return; }
  if(view.name === 'dashboard'){ renderDashboard(topbar, content); }
  else if(view.name === 'timetable'){ renderTimeTable(topbar, content); }
  else if(view.name === 'notices'){ renderNotices(topbar, content); }
  else if(view.name === 'students'){ renderStudents(topbar, content); }
  else if(view.name === 'studentsByClass'){ renderStudentsByClass(topbar, content, view.cls); }
  else if(view.name === 'studentDetail'){ renderStudentDetail(topbar, content, view.studentId); }
  else if(view.name === 'enquiries'){ renderEnquiries(topbar, content); }
  else if(view.name === 'staff'){ renderStaff(topbar, content); }
  else if(view.name === 'staffDetail'){ renderStaffDetail(topbar, content, view.staffId); }
  else if(view.name === 'studentAttendance'){ renderStudentAttendance(topbar, content); }
  else if(view.name === 'distribution'){ renderDistribution(topbar, content); }
  else if(view.name === 'distributionClass'){ renderDistributionClassDetail(topbar, content, view.cls); }
  else if(view.name === 'fees'){ renderFees(topbar, content); }
  else if(view.name === 'salary'){ renderSalary(topbar, content); }
  else if(view.name === 'expenses'){ renderExpenses(topbar, content); }
  else if(view.name === 'users'){ renderUserManagement(topbar, content); }
}
function renderAccessDenied(topbar, content){
  topbar.innerHTML = `<div><h1>Access restricted</h1></div>`;
  content.innerHTML = `<div class="card" style="max-width:480px;">
    <p style="font-size:14px;">Your account doesn't have permission to view this section.</p>
    <p style="font-size:13px;color:var(--ink-soft);margin-top:8px;">If you need access for your role, ask your admin to update it from User Access.</p>
  </div>`;
}

const PENDING_STATUSES = ['new'];
const STAGE_LABELS = {new:'New', admitted:'Admitted', lost:'Lost'};

function renderDashboard(topbar, content){
  topbar.innerHTML = `
    <div><h1>Dashboard</h1><p>Snapshot across enquiries, students, staff, fees, and salary.</p></div>
    <div>
      <label for="timeframeSelect" style="font-size:12px;color:var(--ink-soft);display:block;margin-bottom:3px;">Timeframe</label>
      <select id="timeframeSelect" style="border:1px solid var(--line);border-radius:6px;padding:8px 10px;background:var(--surface);font-family:inherit;" onchange="dashboardTimeframe=this.value; renderDashboard(document.getElementById('topbar'),document.getElementById('content'));">
        ${Object.keys(TIMEFRAME_LABELS).map(k=>`<option value="${k}" ${dashboardTimeframe===k?'selected':''}>${TIMEFRAME_LABELS[k]}</option>`).join('')}
      </select>
    </div>`;

  const range = getTimeframeRange(dashboardTimeframe);
  const timeframeLabel = TIMEFRAME_LABELS[dashboardTimeframe];

  // Always the full current total, regardless of timeframe.
  const activeStudents = students.filter(s => s.status === 'active').length;
  const activeStaff = staffList.filter(s => s.employmentStatus === 'active').length;

  // Period-filtered metrics.
  const admissionsInPeriod = students.filter(s => inRange(s.admissionDate, range)).length;
  const enquiriesInPeriod = enquiries.filter(e => inRange(e.createdAt, range)).length;
  const feesPendingAmt = fees.filter(f => inRange(f.dueDate, range) && feeStatus(f) !== 'paid')
    .reduce((sum,f) => sum + Math.max(0,(Number(f.amountDue)||0)-(Number(f.amountPaid)||0)), 0);

  const todayKey = todayIso();
  const classCounts = CLASS_LEVELS.map(c => {
    const enrolled = students.filter(s=>s.cls===c && s.status==='active').length;
    const todaysMarks = studentAttendance.filter(a => a.date===todayKey && a.cls===c);
    const absent = todaysMarks.filter(a=>a.status==='A').length;
    const leave = todaysMarks.filter(a=>a.status==='L').length;
    return {
      label: c,
      board: BOARD_CLASSES.includes(c),
      count: enrolled,
      absent, leave,
      registerTaken: can('studentAttendance') && (todaysMarks.length > 0),
    };
  });
  const classMax = Math.max(1, ...classCounts.map(c=>c.count));

function renderStudents(topbar, content){
  studentFilters.q = ''; // fresh start every time this page is navigated to
  topbar.innerHTML = `
    <div><h1>Student Directory</h1><p>${students.length} student${students.length===1?'':'s'} on record</p></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="exportStudentsExcel()">Download Excel</button>
      <button class="btn btn-secondary" onclick="printStudents()">Print List</button>
      ${canEdit('students') ? `<button class="btn btn-secondary" onclick="openExcelImportModal()">Import from Excel</button>` : ''}
      ${canEdit('students') ? `<button class="btn btn-primary" onclick="openStudentModal()">+ Add student</button>` : ''}
    </div>`;

  content.innerHTML = `
    <div class="toolbar">
      <input type="text" id="studentSearchInput" placeholder="Search name or scholar no. — or pick a class below" value="${escapeHtml(studentFilters.q)}" oninput="studentFilters.q=this.value; renderStudentsMain();" style="min-width:280px;" />
      <button type="button" id="studentSearchClearBtn" class="btn btn-secondary btn-sm" style="display:none;" onclick="document.getElementById('studentSearchInput').value='';studentFilters.q='';renderStudentsMain();">Clear</button>
    </div>
    <div id="studentsMainWrap"></div>`;
  renderStudentsMain();
}
function renderStudentsMain(){
  const wrap = document.getElementById('studentsMainWrap');
  const clearBtn = document.getElementById('studentSearchClearBtn');
  if(clearBtn) clearBtn.style.display = studentFilters.q.trim() ? '' : 'none';
  if(studentFilters.q.trim()){
    wrap.innerHTML = `<div id="studentsTableWrap"></div>`;
    renderStudentsTable();
    return;
  }
  const classCounts = CLASS_LEVELS.map(c => ({
    label: c, board: BOARD_CLASSES.includes(c),
    count: students.filter(s=>s.cls===c && s.status==='active').length,
  }));
  const classMax = Math.max(1, ...classCounts.map(c=>c.count));
  wrap.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;">
      ${classCounts.map(c => `
        <button onclick="goToStudentsByClass('${c.label}')" style="text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:12px 14px;cursor:pointer;font-family:inherit;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:14px;font-weight:600;">${classDisplayLabel(c.label)}</span>
            ${c.board?'<span class="record-tag" style="padding:1px 6px;">Board</span>':''}
          </div>
          <div style="margin-top:10px;height:6px;background:var(--surface-alt);border-radius:99px;overflow:hidden;">
            <span style="display:block;height:100%;background:${c.board?'var(--accent)':'var(--brand)'};width:${(c.count/classMax)*100}%;"></span>
          </div>
          <div style="margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:14px;">${c.count} student${c.count===1?'':'s'}</div>
        </button>`).join('')}
    </div>`;
}
function goToStudentsByClass(cls){
  view = { name: 'studentsByClass', studentId: null, cls };
  renderSidebar();
  renderApp();
}
function renderStudentsByClass(topbar, content, cls){
  const roster = students.filter(s=>s.cls===cls && s.status==='active').sort((a,b)=>a.firstName.localeCompare(b.firstName));
  topbar.innerHTML = `
    <div>
      <button class="btn btn-secondary btn-sm" onclick="goTo('students')" style="margin-bottom:8px;">&larr; All classes</button>
      <h1>${classDisplayLabel(cls)}</h1>
      <p>${roster.length} student${roster.length===1?'':'s'} enrolled</p>
    </div>
    ${canEdit('students') ? `<button class="btn btn-primary" onclick="openStudentModal(null,'${cls}')">+ Add student</button>` : ''}`;

  content.innerHTML = `
    <div class="card" style="margin-bottom:16px;">
      <h2 style="font-size:16px;">Students</h2>
      <div style="margin-top:10px;">
        ${roster.length===0 ? `<p style="font-size:13px;color:var(--ink-soft);">No active students in this class yet.</p>` : `
        <div class="table-wrap"><table>
          <thead><tr><th>Student</th><th>Scholar no.</th><th>Guardian contact</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${roster.map(s => `
              <tr>
                <td><div style="display:flex;align-items:center;gap:10px;cursor:pointer;" onclick="goToStudent('${s.id}')">
                  ${avatarHtml(s.photo, s.firstName, s.lastName, 30)}
                  <span style="font-weight:500;">${escapeHtml(s.firstName)} ${escapeHtml(s.lastName)}</span>
                </div></td>
                <td><span class="record-tag">${escapeHtml(s.admissionNumber)}</span></td>
                <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);">${escapeHtml(s.fatherPhone||s.motherPhone||s.phone||'—')}</td>
                <td>${statusPill(s.status)}</td>
                <td style="text-align:right;"><button class="btn btn-secondary btn-sm" onclick="goToStudent('${s.id}')">View</button></td>
              </tr>`).join('')}
          </tbody>
        </table></div>`}
      </div>
    </div>

    ${can('studentAttendance') ? `
    <div class="card" style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2 style="font-size:16px;">Attendance</h2>
        <button class="btn btn-secondary btn-sm" onclick="attendanceView={cls:'${cls}',date:todayIso()};goTo('studentAttendance');">Open register</button>
      </div>
      <div id="classAttendanceSummary" style="margin-top:10px;font-size:13px;"></div>
    </div>` : ''}

    ${timeTableData.periods.length>0 ? `
    <div class="card">
      <h2 style="font-size:16px;">Time Table</h2>
      <div style="margin-top:10px;overflow-x:auto;">
        <table style="width:100%;font-size:12px;border-collapse:collapse;">
          <thead><tr>${timeTableData.periods.map(p=>`<th style="text-align:left;padding:4px 8px;white-space:nowrap;border-bottom:1px solid var(--line);">${escapeHtml(p.label)}</th>`).join('')}</tr></thead>
          <tbody><tr>${timeTableData.periods.map(p=>{
            if(p.isBreak) return `<td style="padding:4px 8px;color:var(--accent);font-weight:600;">${escapeHtml(p.label)}</td>`;
            const val = timeTableData.cells[cls+'|'+p.id] || '—';
            return `<td style="padding:4px 8px;">${escapeHtml(val)}</td>`;
          }).join('')}</tr></tbody>
        </table>
      </div>
    </div>` : ''}`;

  if(can('studentAttendance')){
    const todayKey = todayIso();
    const marks = studentAttendance.filter(a=>a.cls===cls && a.date===todayKey);
    const absent = marks.filter(a=>a.status==='A').length;
    const leave = marks.filter(a=>a.status==='L').length;
    const el = document.getElementById('classAttendanceSummary');
    if(el){
      el.innerHTML = marks.length>0
        ? `<span style="color:var(--bad);font-weight:600;">${absent} absent</span> · <span style="color:var(--accent);font-weight:600;">${leave} leave</span> today (of ${roster.length})`
        : `<span style="color:var(--ink-soft);">Today's register not taken yet</span>`;
    }
  }
}
function getFilteredStudents(){
  const q = studentFilters.q.toLowerCase();
  return students.filter(s => {
    if(q && !(`${s.firstName} ${s.lastName} ${s.admissionNumber}`.toLowerCase().includes(q))) return false;
    return true;
  }).sort((a,b)=> a.lastName.localeCompare(b.lastName));
}
function renderStudentsTable(){
  const filtered = getFilteredStudents();

  document.getElementById('studentsTableWrap').innerHTML = filtered.length===0 ? `<div class="table-wrap"><div class="empty">No students match "${escapeHtml(studentFilters.q)}".</div></div>` : `
    <div class="table-wrap"><table>
      <thead><tr><th>Student</th><th>Scholar no.</th><th>Class</th><th>Guardian contact</th><th>Status</th><th></th></tr></thead>
      <tbody>
        ${filtered.map(s => `
          <tr>
            <td>
              <div style="display:flex;align-items:center;gap:10px;cursor:pointer;" onclick="goToStudent('${s.id}')">
                ${avatarHtml(s.photo, s.firstName, s.lastName, 34)}
                <span style="font-weight:500;">${escapeHtml(s.firstName)} ${escapeHtml(s.lastName)}</span>
              </div>
            </td>
            <td><span class="record-tag">${escapeHtml(s.admissionNumber)}</span></td>
            <td style="color:var(--ink-soft);">${escapeHtml(s.cls)}${escapeHtml(s.section)} · Roll ${escapeHtml(s.rollNumber||'—')}</td>
            <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);">${escapeHtml(s.fatherPhone||s.motherPhone||'—')}</td>
            <td>${statusPill(s.status)}</td>
            <td style="text-align:right;"><button class="btn btn-secondary btn-sm" onclick="goToStudent('${s.id}')">View</button></td>
          </tr>`).join('')}
      </tbody>
    </table></div>`;
}
function statusPill(status){
  if(status==='active') return `<span class="pill pill-good">Active</span>`;
  if(status==='tc_issued') return `<span class="pill pill-bad">TC issued</span>`;
  return `<span class="pill pill-neutral">Inactive</span>`;
}

        </div>
        <div class="field"><label>Picked up by — name</label><input name="pickupPersonName" value="${v('pickupPersonName')}" placeholder="if not the parent" /></div>
        <div class="field"><label>Picked up by — phone</label><input name="pickupPersonPhone" value="${v('pickupPersonPhone')}" /></div>
        <div class="field"><label>Driver's name</label><input name="driverName" value="${v('driverName')}" placeholder="if using school transport" /></div>
        <div class="field"><label>Driver's phone</label><input name="driverPhone" value="${v('driverPhone')}" /></div>
        <div class="field span2"><label>Vehicle no.</label><input name="vehicleNumber" value="${v('vehicleNumber')}" /></div>
        ` : `
        <div class="section-title">More details</div>
        <p style="grid-column:1/-1;font-size:12px;color:var(--ink-soft);margin:0;">Roll number, gender, blood group, transport, bank details, and other records become editable once this student is saved — open their profile and click <strong>Edit</strong> afterward.</p>
        `}

      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">${s?'Save changes':'Add student'}</button>
      </div>
    </form>`);
  document.getElementById('studentForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target).entries());
    const photoFile = e.target.elements.namedItem('photoFile').files[0];
    const docFile = e.target.elements.namedItem('documentFile').files[0];
    delete fd.photoFile;
    delete fd.documentFile;
    fd.photo = photoFile ? await fileToBase64(photoFile) : (s ? s.photo : null);
    if(docFile){
      fd.documentBase64 = await fileToBase64(docFile);
      fd.documentName = docFile.name;
    } else if(s){
      fd.documentBase64 = s.documentBase64;
      fd.documentName = s.documentName;
    }

    let newStudentId = null;
    let routedToEnquiry = false;
    if(s){
      Object.assign(s, fd);
    } else if((!fd.admissionFeesPaid || Number(fd.admissionFeesPaid) <= 0) && !pendingConversion){
      // No installment recorded at submission — per school policy this isn't a confirmed
      // admission yet, so it's logged as an Enquiry instead of a Student record.
      const enq = {
        id: uid('enq'),
        enquiryNumber: 'ENQ-' + new Date().getFullYear() + '-' + String(enquiries.length+1).padStart(3,'0'),
        childName: `${fd.firstName||''} ${fd.lastName||''}`.trim(),
        dob: fd.dob || '',
        classApplyingFor: fd.cls || '',
        parentName: fd.fatherName || fd.motherName || fd.guardianName || '',
        parentPhone: fd.fatherPhone || fd.motherPhone || fd.phone || fd.whatsapp || '',
        source: 'Walk-in',
        nextFollowUpDate: '',
        note: fd.note || '',
        status: 'new',
        followUps: [{date: todayIso(), note: 'Admission form filled but no installment paid yet — auto-logged as an enquiry.'}],
        convertedStudentId: null,
        createdAt: new Date().toISOString(),
      };
      enquiries.push(enq);
      routedToEnquiry = true;
    } else if((!fd.admissionFeesPaid || Number(fd.admissionFeesPaid) <= 0) && pendingConversion){
      alert("This enquiry can't be converted yet — record an installment amount to confirm the admission.");
      pendingConversion = null;
      return;
    } else {
      const year = fd.admissionDate ? fd.admissionDate.slice(0,4) : new Date().getFullYear();
      fd.id = uid('stu');
      fd.admissionNumber = 'CND/' + year + '/' + String(students.length+1).padStart(3,'0');
      fd.status = 'active';
      fd.tc = {issued:false};
      students.push(fd);
      newStudentId = fd.id;
      fees.push({
        id: uid('fee'), studentId: fd.id, session: currentAcademicYear(), particulars: 'Admission Fee',
        amountDue: fd.admissionFeesPaid, amountPaid: fd.admissionFeesPaid, paymentMode: 'Cash',
        negotiated: false, dueDate: fd.admissionDate||todayIso(), paidDate: fd.admissionDate||todayIso(), notes: 'Recorded automatically from the Admission Form.',
      });
    }
    if(newStudentId && pendingConversion){
      const enq = enquiries.find(x=>x.id===pendingConversion);
      if(enq){ enq.status = 'admitted'; enq.convertedStudentId = newStudentId; }
    }
    pendingConversion = null;
    saveAll();
    closeModal();
    if(routedToEnquiry){
      alert('No installment was recorded, so this was saved as a New Enquiry instead of an admission — you can convert it once a payment comes in.');
      renderEnquiries(document.getElementById('topbar'),document.getElementById('content'));
    }
    else if(newStudentId) goToStudent(newStudentId);
    else if(view.name==='studentDetail' && s) renderStudentDetail(document.getElementById('topbar'),document.getElementById('content'), s.id);
    else renderStudents(document.getElementById('topbar'),document.getElementById('content'));
  });
}
function deleteStudent(id){
  if(!confirm('Delete this student record? This cannot be undone.')) return;
  students = students.filter(s=>s.id!==id);
  saveAll();
  goTo('students');
}

/* ================================================================================
   EXCEL IMPORTER (Students) — generic, reusable, no code changes needed per file.
   Parses with SheetJS (loaded via CDN — the one part of this app that needs the
   internet). Matches columns by their HEADER TEXT rather than fixed position, so
   it self-adapts even if one sheet has an extra column shifting everything else
   over (a real pattern we've hit with these school rosters before).
   ================================================================================ */
var STUDENT_IMPORT_FIELDS = [
  {key:'firstLastName', label:'Full Name (auto-split)', synonyms:["student's name","students name",'student name','full name']},
  {key:'fatherName', label:"Father's Name", synonyms:["father's name","fathers name",'father name']},
  {key:'motherName', label:"Mother's Name", synonyms:["mother's name",'mothers name','mother name']},
  {key:'dob', label:'Date of Birth', synonyms:['dob','date of birth']},
  {key:'category', label:'Category / Caste', synonyms:['caste','category']},
  {key:'studentAadhar', label:'Aadhar No.', synonyms:['aadhar no','aadhar','aadhaar']},
  {key:'studentSSSM', label:'SSSM / Samagra ID', synonyms:['sam. id','sam id','sssm','samagra']},
  {key:'address', label:'Address', synonyms:['address']},
  {key:'phone', label:'Mobile No.', synonyms:['mob. no','mob no','mobile','phone','contact']},
  {key:'schNo', label:'Scholar No.', synonyms:['sch. no','sch no','scholar no','admission no']},
  {key:'rollNumber', label:'Roll / S. No.', synonyms:['s. no','s no','sno','roll no']},
  {key:'section', label:'Section', synonyms:['sec.','sec','section']},
  {key:'ignore', label:'— Ignore this column —', synonyms:[]},
];
function autoMatchColumnHeader(headerText){
  const norm = String(headerText||'').toLowerCase().replace(/[.\s]+/g,' ').trim();
  if(!norm) return 'ignore';
  for(const field of STUDENT_IMPORT_FIELDS){
    for(const syn of field.synonyms){
      if(norm === syn) return field.key;
    }
  }
  for(const field of STUDENT_IMPORT_FIELDS){
    for(const syn of field.synonyms){
      if(norm.includes(syn)) return field.key;
    }
  }
  return 'ignore';
}
function detectHeaderRowIndex(rows){
  for(let i=0; i<Math.min(8, rows.length); i++){
    const row = rows[i];
    if(!row) continue;
    const matches = row.filter(cell => autoMatchColumnHeader(cell) !== 'ignore').length;
    if(matches >= 3) return i;
  }
  return 0;
}
function fuzzyMatchClass(sheetName){
  const norm = String(sheetName||'').toLowerCase().replace(/[.\s-]+/g,'');
  for(const cls of CLASS_LEVELS){
    if(norm === cls.toLowerCase().replace(/[.\s-]+/g,'')) return cls;
  }
  if(norm.includes('nur')) return 'Nursery';
  if(norm.includes('kg') && (norm.includes('2')||norm.includes('ii'))) return 'KG-II';
  if(norm.includes('kg') && (norm.includes('1')||norm.includes('i'))) return 'KG-I';
  const numMatch = norm.match(/(\d{1,2})/);
  if(numMatch && CLASS_LEVELS.includes(numMatch[1])) return numMatch[1];
  return '';
}
function parseDobFlexible(raw){
  if(raw === null || raw === undefined || raw === '') return '';
  if(raw instanceof Date && !isNaN(raw)) return raw.toISOString().slice(0,10);
  if(typeof raw === 'number'){
    const d = new Date(Math.round((raw - 25569) * 86400 * 1000));
    return isNaN(d) ? '' : d.toISOString().slice(0,10);
  }
  const s = String(raw).trim();
  const m = s.match(/^(\d{1,2})\D*(\d{1,2})\D*(\d{4,5})$/);
  if(!m) return '';
  let day = parseInt(m[1],10), month = parseInt(m[2],10), year = parseInt(m[3].slice(0,4),10);
  if(month > 12 && day <= 12){ const t=day; day=month; month=t; }
  if(month < 1 || month > 12 || day < 1 || day > 31) return '';
  return year + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');
}
function normalizeCategoryValue(raw){
  if(raw === null || raw === undefined || raw === '') return '';
  const map = {gen:'General','gen.':'General', general:'General', obc:'OBC','0bc':'OBC', sc:'SC', st:'ST'};
  const key = String(raw).trim().toLowerCase();
  return map[key] || String(raw).trim().toUpperCase();
}
function splitFullName(full){
  const parts = String(full||'').trim().toUpperCase().split(/\s+/).filter(Boolean);
  if(parts.length===0) return {firstName:'', lastName:''};
  return {firstName: parts[0], lastName: parts.length>1 ? parts.slice(1).join(' ') : parts[0]};
}
var excelImportState = { sheets: [], columnMapping: {} };
function openExcelImportModal(){
  excelImportState = { sheets: [], columnMapping: {} };
  openModalWide(`
    <div class="modal-head"><h2 style="font-size:18px;">Import Students from Excel</h2><button onclick="closeModal()">&times;</button></div>
    <p style="font-size:13px;color:var(--ink-soft);margin:-8px 0 16px;">Upload an .xlsx, .xls, or .csv file. If it has multiple sheets — one per class, like your usual roster — all of them show up below to review before importing.</p>
    ${typeof XLSX === 'undefined' ? `<p style="font-size:13px;color:var(--bad);">The Excel reader hasn't finished loading (it needs an internet connection the first time). Wait a moment and try again.</p>` : `<input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" onchange="handleExcelFileSelect(event)" />`}
    <div id="excelImportBody"></div>`);
}
async function handleExcelFileSelect(event){
  const file = event.target.files[0];
  if(!file) return;
  const body = document.getElementById('excelImportBody');
  body.innerHTML = '<p style="font-size:13px;color:var(--ink-soft);margin-top:12px;">Reading file…</p>';
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array', cellDates:true});
    excelImportState.sheets = wb.SheetNames.map(name => {
      const ws = wb.Sheets[name];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:''});
      const headerRowIdx = detectHeaderRowIndex(rows);
      return { name, rows, headerRowIdx, cls: fuzzyMatchClass(name), include: true };
    }).filter(s => s.rows.length > s.headerRowIdx + 1);

    if(excelImportState.sheets.length === 0){
      body.innerHTML = '<p style="font-size:13px;color:var(--bad);margin-top:12px;">No usable data found in this file.</p>';
      return;
    }
    const refSheet = excelImportState.sheets[0];
    const headerRow = refSheet.rows[refSheet.headerRowIdx] || [];
    excelImportState.columnMapping = {};
    headerRow.forEach(h => {
      if(h===undefined || h===null || String(h).trim()==='') return;
      excelImportState.columnMapping[String(h).trim()] = autoMatchColumnHeader(h);
    });
    renderExcelImportReview();
  }catch(err){
    body.innerHTML = '<p style="font-size:13px;color:var(--bad);margin-top:12px;">Could not read this file: ' + escapeHtml(err.message||String(err)) + '</p>';
  }
}
function renderExcelImportReview(){
  const body = document.getElementById('excelImportBody');
  const refSheet = excelImportState.sheets[0];
  const headerRow = (refSheet.rows[refSheet.headerRowIdx] || []).filter(h => h!==undefined && h!==null && String(h).trim()!=='');

  body.innerHTML = `
    <div style="margin-top:18px;">
      <p style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);margin:0 0 8px;">Match your columns</p>
      <p style="font-size:12px;color:var(--ink-soft);margin:0 0 10px;">Detected from "${escapeHtml(refSheet.name)}" — matched by column header text, so it still works even if another sheet's columns are in a different order.</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px 12px;">
        ${headerRow.map(h => `
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:400;margin:0;">
            <span style="min-width:110px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(String(h))}</span>
            <select onchange="excelImportState.columnMapping[${JSON.stringify(String(h))}]=this.value" style="flex:1;font-size:12px;padding:5px 6px;">
              ${STUDENT_IMPORT_FIELDS.map(f => `<option value="${f.key}" ${excelImportState.columnMapping[String(h)]===f.key?'selected':''}>${f.label}</option>`).join('')}
            </select>
          </label>`).join('')}
      </div>
    </div>

    <div style="margin-top:20px;">
      <p style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);margin:0 0 8px;">Sheets to import</p>
      <div class="table-wrap"><table>
        <thead><tr><th></th><th>Sheet</th><th>Class</th><th>Header row</th><th>Rows found</th></tr></thead>
        <tbody>
          ${excelImportState.sheets.map((s,i) => `
            <tr>
              <td><input type="checkbox" ${s.include?'checked':''} onchange="excelImportState.sheets[${i}].include=this.checked" style="width:auto;" /></td>
              <td>${escapeHtml(s.name)}</td>
              <td><select onchange="excelImportState.sheets[${i}].cls=this.value" style="font-size:12px;padding:4px 6px;">
                <option value="">— not a class —</option>
                ${CLASS_LEVELS.map(c=>`<option value="${c}" ${s.cls===c?'selected':''}>${classDisplayLabel(c)}</option>`).join('')}
              </select></td>
              <td><input type="number" min="1" value="${s.headerRowIdx+1}" style="width:56px;font-size:12px;padding:4px 6px;" onchange="excelImportState.sheets[${i}].headerRowIdx=Math.max(0,this.value-1)" /></td>
              <td>${Math.max(0, s.rows.length - s.headerRowIdx - 1)}</td>
            </tr>`).join('')}
        </tbody>
      </table></div>
    </div>

    <div id="excelImportResult" style="margin-top:14px;"></div>

    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button type="button" class="btn btn-primary" onclick="runExcelImport()">Import</button>
    </div>`;
}
function runExcelImport(){
  let imported = 0, skipped = 0;
  const perClass = {};

  excelImportState.sheets.filter(s => s.include && s.cls).forEach(sheet => {
    const headerRow = sheet.rows[sheet.headerRowIdx] || [];
    const indexToField = {};
    headerRow.forEach((h, idx) => {
      if(h===undefined || h===null) return;
      const key = String(h).trim();
      if(key && excelImportState.columnMapping[key] && excelImportState.columnMapping[key] !== 'ignore'){
        indexToField[idx] = excelImportState.columnMapping[key];
      }
    });

    for(let r = sheet.headerRowIdx + 1; r < sheet.rows.length; r++){
      const row = sheet.rows[r];
      if(!row || row.every(c => c===undefined || c===null || String(c).trim()==='')){ continue; }

      const rec = {};
      Object.keys(indexToField).forEach(idxStr => { rec[indexToField[idxStr]] = row[Number(idxStr)]; });

      if(!rec.firstLastName || !String(rec.firstLastName).trim()){ skipped++; continue; }

      const {firstName, lastName} = splitFullName(rec.firstLastName);
      const schNo = rec.schNo!==undefined && rec.schNo!==null ? String(rec.schNo).trim() : '';

      students.push({
        id: uid('stu'),
        admissionNumber: schNo || ('CND/' + new Date().getFullYear() + '/' + String(students.length+1).padStart(3,'0')),
        firstName, lastName,
        fatherName: rec.fatherName ? String(rec.fatherName).trim().toUpperCase() : '',
        motherName: rec.motherName ? String(rec.motherName).trim().toUpperCase() : '',
        dob: parseDobFlexible(rec.dob),
        category: normalizeCategoryValue(rec.category),
        studentAadhar: rec.studentAadhar!==undefined && rec.studentAadhar!==null ? String(rec.studentAadhar).trim() : '',
        studentSSSM: rec.studentSSSM!==undefined && rec.studentSSSM!==null ? String(rec.studentSSSM).trim() : '',
        address: rec.address ? String(rec.address).trim().toUpperCase() : '',
        phone: rec.phone!==undefined && rec.phone!==null ? String(rec.phone).trim() : '',
        whatsapp: rec.phone!==undefined && rec.phone!==null ? String(rec.phone).trim() : '',
        cls: sheet.cls,
        section: rec.section ? String(rec.section).trim().toUpperCase() : 'A',
        rollNumber: rec.rollNumber!==undefined && rec.rollNumber!==null ? String(rec.rollNumber).trim() : '',
        status: 'active', medium: 'English Medium', session: currentAcademicYear(),
        motherTongue: 'Hindi', nationality: 'Indian', tc: {issued:false},
      });
      imported++;
      perClass[sheet.cls] = (perClass[sheet.cls]||0) + 1;
    }
  });

  saveAll();
  const summary = Object.keys(perClass).map(c => classDisplayLabel(c)+': '+perClass[c]).join(', ');
  const resultEl = document.getElementById('excelImportResult');
  if(resultEl){
    resultEl.innerHTML = imported === 0
      ? `<div style="background:var(--bad-soft);color:var(--bad);padding:10px 12px;border-radius:8px;font-size:13px;">No students imported — check that at least one sheet is checked, has a class assigned, and its Name column is mapped.</div>`
      : `<div style="background:var(--good-soft);color:var(--good);padding:10px 12px;border-radius:8px;font-size:13px;">Imported ${imported} student${imported===1?'':'s'}${summary?' — '+escapeHtml(summary):''}.${skipped?' '+skipped+' row(s) skipped (no name found).':''} <a href="#" onclick="closeModal();renderStudents(document.getElementById('topbar'),document.getElementById('content'));return false;" style="color:inherit;text-decoration:underline;">View directory</a></div>`;
  }
  return { imported, skipped, perClass };
}

              <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--line);">
                <div>
                  <span style="font-weight:500;">${escapeHtml(f.particulars)}</span>
                  <span style="color:var(--ink-soft);"> · ${escapeHtml(f.session)}${f.paymentMode?' · '+escapeHtml(f.paymentMode):''}</span>
                  <div style="color:var(--ink-soft);font-size:12px;">${money(f.amountPaid)} of ${money(f.amountDue)} · due ${formatDate(f.dueDate)}</div>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                  ${feeStatusPill(f)}
                  ${Number(f.amountPaid)>0 ? `<button class="btn btn-secondary btn-sm" onclick="printFeeReceipt('${f.id}')">Receipt</button>` : ''}
                  ${canEdit('fees') ? `<button class="btn btn-secondary btn-sm" onclick="openFeeModal('${f.id}')">Edit</button>` : ''}
                </div>
              </div>`).join('')}</div>`;

        </div>

        <div class="card">
          <h2 style="font-size:16px;">Academic</h2>
          <div style="margin-top:12px;">
            ${g2(['Class / Section', escapeHtml(s.cls)+escapeHtml(s.section)], ['Roll number', escapeHtml(s.rollNumber)],
                 ['Medium', escapeHtml(s.medium)], ['Session', escapeHtml(s.session)],
                 ['Admission date', formatDate(s.admissionDate)], ['Fees paid (admission / yearly)', (s.admissionFeesPaid||'—')+' / '+(s.yearlyFeesPaid||'—')],
                 ['Previous school', escapeHtml(s.previousSchool)], ['Previous class / session', escapeHtml(s.previousClassStudied)+(s.previousSession?' · '+escapeHtml(s.previousSession):'')],
                 ['Result of last exam', escapeHtml(s.previousResult)], ['', ''])}
          </div>
        </div>

        <div class="card">
          <h2 style="font-size:16px;">Contact &amp; address</h2>
          <div style="margin-top:12px;">
            ${g2(['Phone', escapeHtml(s.phone)], ['WhatsApp', escapeHtml(s.whatsapp)],
                 ['Email', escapeHtml(s.email)], ['City / Pin code', escapeHtml(s.city)+(s.pincode?' · '+escapeHtml(s.pincode):'')])}
            ${detailField('Address', escapeHtml(s.address)||'—')}
            ${s.permanentAddress ? detailField('Permanent address', escapeHtml(s.permanentAddress)) : ''}
          </div>
        </div>

        <div class="card">
          <h2 style="font-size:16px;">Parent / guardian</h2>
          <div style="margin-top:12px;">
            ${g2(['Father', s.fatherName?escapeHtml(s.fatherName)+(s.fatherPhone?' · '+escapeHtml(s.fatherPhone):''):'—'],
                 ['Father — education / occupation', escapeHtml(s.fatherEducation)+(s.fatherOccupation?' · '+escapeHtml(s.fatherOccupation):'')],
                 ['Mother', s.motherName?escapeHtml(s.motherName)+(s.motherPhone?' · '+escapeHtml(s.motherPhone):''):'—'],
                 ['Mother — education / occupation', escapeHtml(s.motherEducation)+(s.motherOccupation?' · '+escapeHtml(s.motherOccupation):'')],
                 ['Guardian', s.guardianName?escapeHtml(s.guardianName)+(s.guardianRelation?' ('+escapeHtml(s.guardianRelation)+')':''):'—'],
                 ['Guardian phone', escapeHtml(s.guardianPhone)])}
          </div>
        </div>

        <div class="card">
          <h2 style="font-size:16px;">Government IDs &amp; bank</h2>
          <div style="margin-top:12px;">
            ${g2(["Student's Aadhar", escapeHtml(s.studentAadhar)], ['SSSM ID (student / family)', (s.studentSSSM||'—')+' / '+(s.familySSSM||'—')],
                 ['PEN card', escapeHtml(s.studentPEN)], ['APAR ID', escapeHtml(s.studentAPAR)],
                 ["Father's Aadhar", escapeHtml(s.fatherAadhar)], ["Mother's Aadhar", escapeHtml(s.motherAadhar)],
                 ['Bank account', escapeHtml(s.bankAccountNumber)], ['Bank / IFSC', (s.bankName?escapeHtml(s.bankName):'—')+(s.ifscCode?' · '+escapeHtml(s.ifscCode):'')])}
          </div>
        </div>

        <div class="card">
          <h2 style="font-size:16px;">Transport</h2>
          <div style="margin-top:12px;">
            ${g2(['Mode', escapeHtml(s.transportMode)], ['Picked up by', s.pickupPersonName?escapeHtml(s.pickupPersonName)+(s.pickupPersonPhone?' · '+escapeHtml(s.pickupPersonPhone):''):'—'],
                 ["Driver", s.driverName?escapeHtml(s.driverName)+(s.driverPhone?' · '+escapeHtml(s.driverPhone):''):'—'], ['Vehicle no.', escapeHtml(s.vehicleNumber)])}
          </div>
        </div>
      </div>

      <div class="stack">
        <div class="card">
          <h2 style="font-size:16px;">Admission Form</h2>
          <p style="font-size:13px;color:var(--ink-soft);margin:4px 0 16px;">Prints a filled copy of the school's admission form for this student's file.</p>
          <button class="btn btn-primary btn-block" onclick="printAdmissionForm('${s.id}')">Print Admission Form</button>
        </div>

        <div class="card">
          <h2 style="font-size:16px;">Transfer Certificate</h2>
          ${s.tc && s.tc.issued ? `
            <p style="font-size:12px;color:var(--ink-soft);margin:4px 0 14px;">Issued ${formatDate(s.tc.issueDate)} · <span class="record-tag">${escapeHtml(s.tc.tcNumber)}</span></p>
            <div style="font-size:13px;display:grid;gap:8px;margin-bottom:16px;">
              ${detailField('Reason for leaving', s.tc.reasonForLeaving||'—')}
              ${detailField('Last class studied', s.tc.lastClassStudied||'—')}
              ${detailField('Promotion status', s.tc.promotionStatus||'—')}
              ${detailField('Conduct', s.tc.conductRemark||'—')}
              ${detailField('Attendance', (s.tc.daysPresent||'—')+' / '+(s.tc.workingDays||'—')+' working days')}
            </div>
            <button class="btn btn-primary btn-block" onclick="printTC('${s.id}')">Print TC</button>
          ` : (canEdit('students') ? `
            <p style="font-size:13px;color:var(--ink-soft);margin:4px 0 16px;">No TC issued yet. Filling this in marks the student as left and produces a printable certificate.</p>
            <button class="btn btn-primary btn-block" onclick="openTCModal('${s.id}')">Generate TC</button>
          ` : `<p style="font-size:13px;color:var(--ink-soft);margin:4px 0;">No TC issued yet.</p>`)}
        </div>
      </div>
    </div>`;
}
function detailField(label, value){
  return `<div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);">${label}</div><div style="margin-top:2px;">${value}</div></div>`;
}

function openTCModal(studentId){
  const s = students.find(x=>x.id===studentId);
  openModal(`
    <div class="modal-head"><h2 style="font-size:18px;">Generate Transfer Certificate</h2><button onclick="closeModal()">&times;</button></div>
    <p style="font-size:13px;color:var(--ink-soft);margin:-8px 0 16px;">For ${escapeHtml(s.firstName)} ${escapeHtml(s.lastName)} · ${escapeHtml(s.admissionNumber)}</p>
    <form id="tcForm">
      <div class="form-grid">
        <div class="field"><label>Date of issue (leaving date)</label><input type="date" name="issueDate" value="${todayIso()}" required /></div>
        <div class="field"><label>Last date of attendance</label><input type="date" name="lastAttendanceDate" value="${todayIso()}" required /></div>
        <div class="field"><label>Last class studied</label><input name="lastClassStudied" value="${escapeHtml(s.cls)}" required /></div>
        <div class="field span2"><label>Reason for leaving</label><input name="reasonForLeaving" placeholder="e.g. Family relocation" required /></div>
        <div class="field"><label>Result of last annual exam</label>
          <select name="lastExamResult"><option>Passed</option><option>Promoted</option><option>Failed</option><option>Awaited</option></select>
        </div>
        <div class="field"><label>Promoted to class</label><input name="promotionStatus" placeholder="e.g. 8 (leave blank if not applicable)" /></div>
        <div class="field"><label>General conduct</label>
          <select name="conductRemark">
            <option>Good</option><option>Very good</option><option>Satisfactory</option>
          </select>
        </div>
        <div class="field"><label>Working days</label><input type="number" name="workingDays" min="0" /></div>
        <div class="field"><label>Days present</label><input type="number" name="daysPresent" min="0" /></div>
        <div class="field span2" style="display:flex;align-items:center;gap:8px;margin-top:2px;">
          <input type="checkbox" name="duesCleared" id="tcDuesCleared" checked style="width:auto;" />
          <label for="tcDuesCleared" style="margin:0;font-weight:400;">All fee dues paid before leaving</label>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Generate &amp; print</button>
      </div>
    </form>`);
  document.getElementById('tcForm').addEventListener('submit', function(e){
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target).entries());
    fd.duesCleared = !!document.getElementById('tcDuesCleared').checked;
    const year = fd.issueDate.slice(0,4);
    const seq = students.filter(x=>x.tc && x.tc.issued).length + 1;
    s.tc = { issued:true, tcNumber: year+'/'+seq, ...fd };
    s.status = 'tc_issued';
    saveAll();
    closeModal();
    renderStudentDetail(document.getElementById('topbar'),document.getElementById('content'), s.id);
    printTC(s.id);
  });
}

}

/** Best-effort match against the timetable grid — cells hold free text like
 *  "Maths - Sarita", matched here against the staff member's first name. */
function getStaffTimetable(staffMember){
  const firstName = (staffMember.firstName||'').toLowerCase();
  if(!firstName) return [];
  const rows = [];
  CLASS_LEVELS.forEach(cls => {
    timeTableData.periods.forEach(p => {
      if(p.isBreak) return;
      const val = timeTableData.cells[cls+'|'+p.id];
      if(!val) return;
      const teacher = extractTeacherName(val).toLowerCase();
      if(teacher && (teacher === firstName || teacher.includes(firstName))){
        rows.push({period: p, cls, subject: extractSubject(val)});
      }
    });
  });
  return rows;
}
